<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    :root {
      --bg: #1e1e1e;
      --surface: #2c2c2c;
      --surface-hover: #383838;
      --border: #3e3e3e;
      --text: #e5e5e5;
      --text-secondary: #808080;
      --text-dim: #595959;
      --accent: #0d99ff;
      --accent-dim: rgba(13, 153, 255, 0.15);
      --success: #1db954;
      --success-dim: rgba(29, 185, 84, 0.12);
      --error: #f24822;
      --error-dim: rgba(242, 72, 34, 0.12);
      --command: #b388ff;
      --font-sans: Inter, system-ui, -apple-system, sans-serif;
      --font-mono: 'SF Mono', Monaco, 'Cascadia Code', 'Consolas', monospace;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: var(--font-sans);
      font-size: 11px;
      color: var(--text);
      background: var(--bg);
      padding: 8px 10px;
      line-height: 1.4;
      overflow: hidden;
    }

    /* ── Header Row ──────────────────────────────── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 6px;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .brand-icon {
      width: 16px;
      height: 16px;
      border-radius: 3px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .brand-icon svg {
      width: 16px;
      height: 16px;
    }

    .brand-name {
      font-size: 12px;
      font-weight: 600;
      color: var(--text);
    }

    .status-pill {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 2px 8px 2px 6px;
      border-radius: 100px;
      font-size: 10px;
      font-weight: 500;
      transition: all 0.3s ease;
    }

    .status-pill.disconnected {
      background: var(--error-dim);
      color: var(--error);
    }

    .status-pill.connected {
      background: var(--success-dim);
      color: var(--success);
    }

    .status-pill.connecting {
      background: rgba(255, 205, 41, 0.12);
      color: #ffcd29;
    }

    .status-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: currentColor;
    }

    .status-pill.connected .status-dot {
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; box-shadow: 0 0 0 0 currentColor; }
      50% { opacity: 0.6; box-shadow: 0 0 5px 1px currentColor; }
    }

    /* ── Stats Row ───────────────────────────────── */
    .stats {
      display: flex;
      gap: 4px;
      margin-bottom: 6px;
    }

    .stat {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 4px 6px;
      text-align: center;
      transition: background 0.15s ease;
    }

    .stat:hover { background: var(--surface-hover); }

    .stat-val {
      font-size: 13px;
      font-weight: 600;
      line-height: 1.2;
      font-variant-numeric: tabular-nums;
    }

    .stat-val.accent { color: var(--accent); }
    .stat-val.success { color: var(--success); }

    .stat-lbl {
      font-size: 9px;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

    /* ── Log Toggle ──────────────────────────────── */
    .log-toggle {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 3px 6px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      cursor: pointer;
      transition: background 0.15s ease;
      user-select: none;
    }

    .log-toggle:hover { background: var(--surface-hover); }

    .log-toggle-left {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .log-toggle-label {
      font-size: 10px;
      font-weight: 500;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

    .log-count {
      font-size: 9px;
      color: var(--text-dim);
      background: var(--border);
      padding: 0 4px;
      border-radius: 3px;
      line-height: 1.6;
    }

    .log-toggle-icon {
      font-size: 8px;
      color: var(--text-dim);
      transition: transform 0.2s ease;
    }

    .log-toggle.open .log-toggle-icon {
      transform: rotate(180deg);
    }

    .log-clear {
      font-size: 9px;
      color: var(--text-dim);
      background: none;
      border: none;
      cursor: pointer;
      padding: 1px 4px;
      border-radius: 3px;
      font-family: var(--font-sans);
      transition: all 0.15s ease;
    }

    .log-clear:hover {
      color: var(--text);
      background: var(--surface-hover);
    }

    /* ── Log Area ────────────────────────────────── */
    .log-wrap {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.25s ease;
    }

    .log-wrap.open {
      max-height: 150px;
    }

    .log {
      max-height: 130px;
      overflow-y: auto;
      margin-top: 4px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 2px 0;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    .log::-webkit-scrollbar { width: 3px; }
    .log::-webkit-scrollbar-track { background: transparent; }
    .log::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .log-entry {
      padding: 2px 8px;
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--text-secondary);
      display: flex;
      align-items: flex-start;
      gap: 5px;
      line-height: 1.5;
      animation: fadeIn 0.15s ease;
    }

    .log-entry:hover { background: var(--surface-hover); }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .log-icon {
      flex-shrink: 0;
      width: 12px;
      text-align: center;
      font-size: 9px;
      line-height: 1.5;
    }

    .log-entry.success .log-icon { color: var(--success); }
    .log-entry.error .log-icon { color: var(--error); }
    .log-entry.info .log-icon { color: var(--accent); }
    .log-entry.command .log-icon { color: var(--command); }

    .log-time { color: var(--text-dim); flex-shrink: 0; }
    .log-msg { flex: 1; word-break: break-word; }
    .log-msg .hl { color: var(--command); font-weight: 500; }
  </style>
</head>
<body>
  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <div class="brand-icon">
        <svg viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M156 0H44C19.6995 0 0 19.6995 0 44V156C0 180.301 19.6995 200 44 200H156C180.301 200 200 180.301 200 156V44C200 19.6995 180.301 0 156 0Z" fill="url(#brandGrad)"/>
          <path d="M55 32H39C36.7909 32 35 33.7909 35 36V164C35 166.209 36.7909 168 39 168H55C57.2091 168 59 166.209 59 164V36C59 33.7909 57.2091 32 55 32Z" fill="white"/>
          <path d="M136 32H39C36.7909 32 35 33.7909 35 36V52C35 54.2091 36.7909 56 39 56H136C138.209 56 140 54.2091 140 52V36C140 33.7909 138.209 32 136 32Z" fill="white"/>
          <path d="M113 78H39C36.7909 78 35 79.7909 35 82V94C35 96.2091 36.7909 98 39 98H113C115.209 98 117 96.2091 117 94V82C117 79.7909 115.209 78 113 78Z" fill="white"/>
          <path opacity="0.85" d="M157.132 129.232L150.768 122.868C149.791 121.892 148.209 121.892 147.232 122.868L140.868 129.232C139.892 130.209 139.892 131.791 140.868 132.768L147.232 139.132C148.209 140.108 149.791 140.108 150.768 139.132L157.132 132.768C158.108 131.791 158.108 130.209 157.132 129.232Z" fill="white"/>
          <defs>
            <linearGradient id="brandGrad" x1="0" y1="0" x2="200" y2="200" gradientUnits="userSpaceOnUse">
              <stop stop-color="#0D99FF"/>
              <stop offset="0.5" stop-color="#6C5CE7"/>
              <stop offset="1" stop-color="#B388FF"/>
            </linearGradient>
          </defs>
        </svg>
      </div>
      <span class="brand-name">Figma Forge</span>
    </div>
    <div class="status-pill disconnected" id="statusPill">
      <span class="status-dot"></span>
      <span id="statusText">Connecting</span>
    </div>
  </div>

  <!-- Stats -->
  <div class="stats">
    <div class="stat">
      <div class="stat-val accent" id="statCommands">0</div>
      <div class="stat-lbl">Cmds</div>
    </div>
    <div class="stat">
      <div class="stat-val" id="statNodes">0</div>
      <div class="stat-lbl">Nodes</div>
    </div>
    <div class="stat">
      <div class="stat-val success" id="statUptime">0s</div>
      <div class="stat-lbl">Up</div>
    </div>
  </div>

  <!-- Log Toggle -->
  <div class="log-toggle" id="logToggle" onclick="toggleLog()">
    <div class="log-toggle-left">
      <span class="log-toggle-label">Activity</span>
      <span class="log-count" id="logCount">0</span>
    </div>
    <div style="display:flex;align-items:center;gap:6px;">
      <button class="log-clear" onclick="event.stopPropagation();clearLog()">Clear</button>
      <span class="log-toggle-icon">▾</span>
    </div>
  </div>

  <!-- Log Area (collapsed by default) -->
  <div class="log-wrap" id="logWrap">
    <div class="log" id="log"></div>
  </div>

  <script>
    // ── Constants ──────────────────────────────────
    const BRIDGE_PORT = 37849;
    const RECONNECT_INTERVAL = 3000;
    const MAX_RECONNECT_ATTEMPTS = 20;

    // ── State ──────────────────────────────────────
    let ws = null;
    let reconnectAttempts = 0;
    let reconnectTimer = null;
    let commandCount = 0;
    let nodeCount = 0;
    let logEntryCount = 0;
    let startTime = null;
    let uptimeTimer = null;

    // ── DOM ────────────────────────────────────────
    const statusPill = document.getElementById('statusPill');
    const statusText = document.getElementById('statusText');
    const logEl = document.getElementById('log');
    const logWrap = document.getElementById('logWrap');
    const logToggle = document.getElementById('logToggle');
    const logCountEl = document.getElementById('logCount');
    const statCommands = document.getElementById('statCommands');
    const statNodes = document.getElementById('statNodes');
    const statUptime = document.getElementById('statUptime');

    const ICONS = { success: '✓', error: '✗', info: '●', command: '▸' };

    // ── Log Toggle ─────────────────────────────────
    function toggleLog() {
      logWrap.classList.toggle('open');
      logToggle.classList.toggle('open');
    }

    function clearLog() {
      logEl.innerHTML = '';
      logEntryCount = 0;
      logCountEl.textContent = '0';
    }

    // ── Logging ────────────────────────────────────
    function log(message, type = 'info') {
      addLogEntry(type, escapeHtml(message));
    }

    function logCommand(toolName, duration) {
      commandCount++;
      statCommands.textContent = commandCount;
      const msg = `<span class="hl">${escapeHtml(toolName)}</span>${duration ? ` <span style="color:var(--text-dim)">(${duration}ms)</span>` : ''}`;
      addLogEntry('command', msg);
    }

    function addLogEntry(type, html) {
      logEntryCount++;
      logCountEl.textContent = logEntryCount > 99 ? '99+' : logEntryCount;

      const entry = document.createElement('div');
      entry.className = `log-entry ${type}`;
      const time = new Date().toLocaleTimeString('en-US', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });

      entry.innerHTML = `
        <span class="log-icon">${ICONS[type] || ICONS.info}</span>
        <span class="log-time">${time.slice(0, 5)}</span>
        <span class="log-msg">${html}</span>
      `;

      logEl.appendChild(entry);
      logEl.scrollTop = logEl.scrollHeight;

      while (logEl.children.length > 80) {
        logEl.removeChild(logEl.firstChild);
      }
    }

    function escapeHtml(str) {
      const d = document.createElement('div');
      d.textContent = str;
      return d.innerHTML;
    }

    // ── Status ─────────────────────────────────────
    function setStatus(status, text) {
      statusPill.className = `status-pill ${status}`;
      statusText.textContent = text;
    }

    // ── Uptime ─────────────────────────────────────
    function startUptime() {
      startTime = Date.now();
      uptimeTimer = setInterval(updateUptime, 1000);
    }

    function stopUptime() {
      if (uptimeTimer) clearInterval(uptimeTimer);
      startTime = null;
      statUptime.textContent = '0s';
    }

    function updateUptime() {
      if (!startTime) return;
      const s = Math.floor((Date.now() - startTime) / 1000);
      statUptime.textContent = s < 60 ? `${s}s` : s < 3600 ? `${Math.floor(s/60)}m` : `${Math.floor(s/3600)}h`;
    }

    // ── WebSocket ──────────────────────────────────
    function connect() {
      if (ws && (ws.readyState === WebSocket.OPEN || ws.readyState === WebSocket.CONNECTING)) return;
      setStatus('connecting', 'Connecting');

      try {
        ws = new WebSocket(`ws://localhost:${BRIDGE_PORT}`);
      } catch (err) {
        log(`Connection error: ${err.message}`, 'error');
        scheduleReconnect();
        return;
      }

      ws.onopen = () => {
        reconnectAttempts = 0;
        setStatus('connected', 'Connected');
        log('Connected to Bridge', 'success');
        startUptime();
        parent.postMessage({ pluginMessage: { type: 'ws-status', status: 'connected' } }, '*');
      };

      ws.onmessage = (event) => {
        try {
          const msg = JSON.parse(event.data);
          if (msg.type === 'command') {
            const p = msg.payload;
            if (p && p.tool) logCommand(p.tool, p.duration);
            if (p && p.nodeId) { nodeCount++; statNodes.textContent = nodeCount; }
            parent.postMessage({ pluginMessage: p }, '*');
          }
        } catch (err) {
          log(`Parse error: ${err.message}`, 'error');
        }
      };

      ws.onclose = (e) => {
        setStatus('disconnected', 'Disconnected');
        log(`Disconnected (${e.code})`, 'error');
        stopUptime();
        parent.postMessage({ pluginMessage: { type: 'ws-status', status: 'disconnected' } }, '*');
        scheduleReconnect();
      };

      ws.onerror = () => setStatus('disconnected', 'Error');
    }

    function scheduleReconnect() {
      if (reconnectAttempts >= MAX_RECONNECT_ATTEMPTS) { log('Max retries reached', 'error'); return; }
      if (reconnectTimer) clearTimeout(reconnectTimer);
      reconnectTimer = setTimeout(() => { reconnectAttempts++; log(`Retry ${reconnectAttempts}...`); connect(); }, RECONNECT_INTERVAL);
    }

    // ── Plugin Messages ────────────────────────────
    window.onmessage = (event) => {
      const msg = event.data.pluginMessage;
      if (!msg) return;
      if (msg.type === 'result' && ws?.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ type: 'result', payload: msg.payload }));
      } else if (msg.type === 'event' && ws?.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ type: 'event', payload: msg.payload }));
      } else if (msg.type === 'init') {
        log('Plugin init, connecting...');
        connect();
      }
    };

    // ── Start ──────────────────────────────────────
    connect();
  </script>
</body>
</html>
